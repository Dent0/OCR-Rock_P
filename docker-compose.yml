services:
  redis:
    image: redis:7-alpine
    container_name: ocr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build: .
    container_name: ocr_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./classes:/app/classes
      - ./ocr_batch.py:/app/ocr_batch.py
      - ./uploads:/app/uploads
      - ./results:/app/results
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - RESULT_DIR=/app/results
      - DEFAULT_ENGINE=tesseract
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build: .
    container_name: ocr_worker
    volumes:
      - ./app:/app/app
      - ./classes:/app/classes
      - ./ocr_batch.py:/app/ocr_batch.py
      - ./uploads:/app/uploads
      - ./results:/app/results
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - RESULT_DIR=/app/results
      - DEFAULT_ENGINE=tesseract
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker --loglevel=info --concurrency=1
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: ocr_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    command: celery --broker=redis://redis:6379/0 flower --port=5555

volumes:
  redis_data:
  uploads:
  results: