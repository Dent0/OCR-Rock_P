global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'celery'
    static_configs:
      - targets: ['celery-exporter:9808']  # ← ИСПРАВЛЕНО!

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']